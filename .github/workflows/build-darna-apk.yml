name: Darna APK Build

on:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build Darna APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (Darna)
        run: flutter build apk --target-platform android-arm64 --analyze-size

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Darna-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload size analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Darna-size-analysis
          path: |
            build/**/snapshot*.json
            build/**/trace*.json
